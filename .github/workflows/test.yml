# GitHub Actions workflow — runs the pytest suite on every PR and push
# to the default branch. Listing both `main` and `master` keeps this
# working whether the repo defaults to one or the other.

name: Tests

"on":
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
