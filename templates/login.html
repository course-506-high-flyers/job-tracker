{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-5 mx-auto">
        <h1 class="h3 mb-4">Log in</h1>

        <!-- GitHub OAuth login -->
        <div class="d-grid mb-4">
            <a href="/login/github" class="btn btn-dark btn-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                     fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                             0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                             -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
                             2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                             0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
                             0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09
                             2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08
                             2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
                             3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
                             2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
                </svg>
                Sign in with GitHub
            </a>
        </div>

        <div class="d-flex align-items-center mb-4">
            <hr class="flex-grow-1">
            <span class="mx-3 text-muted small">or sign in with password</span>
            <hr class="flex-grow-1">
        </div>

        <!-- Password login form -->
        <form method="POST" action="{{ url_for('login') }}" data-disable-on-submit>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username"
                       name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password"
                       name="password" required>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox"
                       id="remember_me" name="remember_me">
                <label class="form-check-label" for="remember_me">
                    Remember me
                </label>
            </div>
            <button type="submit" class="btn btn-success">Log in</button>
            <a href="{{ url_for('register') }}" class="btn btn-link">
                Need an account?
            </a>
        </form>
    </div>
</div>
{% endblock %}
