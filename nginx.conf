# ============================================================================
# job-tracker / nginx.conf  (Assignment 8 — production hardening)
# ----------------------------------------------------------------------------
# Owner split (per Turn 32 role boundary, 3-person team):
#   ADEN  — server block, TLS termination, rate-limit zones, attack-path 404s
#   BOMA  — security headers + static-asset location (marked === BOMA === below)
#   DARRELL — owns gunicorn upstream target (app:8000) + Dockerfile that
#            mounts certs/ into /etc/nginx/certs/
#
# Sanity check this file (from repo root, requires docker):
#   docker run --rm -v "$PWD/nginx.conf:/etc/nginx/nginx.conf:ro" \
#     nginx:1.27-alpine nginx -t
# ============================================================================

# Run as the unprivileged nginx user inside the official image. Master process
# is PID 1 in the container; workers are auto-sized to CPU count.
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Combined log format with $request_time so we can prove rate-limit hits
    # in role_dbsec_aden.md Q1 (before/after nginx evidence).
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Hide nginx version in Server header and error pages.
    server_tokens   off;

    # Reasonable client body cap. /applications/<id>/insight only sends an
    # int path-param; no upload routes exist in this app today.
    client_max_body_size 1m;

    # ------------------------------------------------------------------------
    # ADEN: rate-limit zones
    # ------------------------------------------------------------------------
    # Justification table (mirrored in role_dbsec_aden.md Q5):
    #   auth_zone     /login, /register             5 r/m  burst 3
    #   oauth_zone    /login/github, /auth/github/* 10 r/m burst 5
    #   insight_zone  /applications/<id>/insight    30 r/m burst 5
    #   general_zone  everything else               60 r/m burst 20
    #
    # Keys are $binary_remote_addr (16 bytes/IP, ~64k IPs per 1m of memory).
    # ------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=auth_zone:10m     rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=oauth_zone:10m    rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=insight_zone:10m  rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=general_zone:10m  rate=60r/m;

    # Return 429 (not the default 503) when the bucket is empty.
    limit_req_status  429;
    limit_req_log_level  warn;

    # Connection cap per IP (independent of rate). Cheap DoS guardrail.
    limit_conn_zone   $binary_remote_addr  zone=conn_per_ip:10m;

    # ------------------------------------------------------------------------
    # DARRELL: gunicorn upstream
    # ------------------------------------------------------------------------
    # The app service must expose gunicorn on :8000 and bind 0.0.0.0:8000
    # (NOT 127.0.0.1 — nginx and app are separate containers on the backend
    # network defined in docker-compose.yml). gunicorn.conf.py is Darrell's.
    upstream app_upstream {
        server app:8000;
        keepalive 32;
    }

    # Shared proxy headers (applied via `include` in every proxy_pass block).
    # Kept inline (not in a separate proxy_params file) so this nginx.conf is
    # self-contained for grading.
    proxy_http_version  1.1;
    proxy_set_header    Host               $host;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto  $scheme;
    proxy_set_header    X-Forwarded-Host   $host;
    proxy_set_header    Connection         "";

    # NOTE for Darrell: X-Forwarded-Proto only takes effect on the Flask side
    # if app.py wraps the WSGI app with werkzeug.middleware.proxy_fix.ProxyFix.
    # Without ProxyFix, request.is_secure stays False and SESSION_COOKIE_SECURE
    # cookies will not be sent. This is the "LLM surprise" answer for
    # common_questions_aden.md Q7.

    # ------------------------------------------------------------------------
    # ADEN: HTTP server — redirect everything to HTTPS
    # ------------------------------------------------------------------------
    # Exception: the ACME http-01 challenge path stays on :80 so certbot can
    # renew. Everything else gets a permanent 301 to https://.
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------------------
    # ADEN: HTTPS server — TLS termination + rate limits + attack-path 404s
    # ------------------------------------------------------------------------
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;
        server_name  _;

        # TLS: certs are mounted from ./certs/ on the host (gitignored;
        # see .gitignore). Self-signed for local; Let's Encrypt on EC2.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Mozilla "intermediate" profile (TLS 1.2+ only, modern ciphers).
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;
        ssl_session_cache          shared:TLS:10m;
        ssl_session_timeout        1d;
        ssl_session_tickets        off;

        # Per-IP connection cap.
        limit_conn  conn_per_ip  20;

        # ====================================================================
        # === BOMA: security headers go here ===
        # ====================================================================
        # Boma owns these add_header directives. Suggested baseline (per
        # Mozilla Observatory A-grade) — Boma to confirm wording:
        #
        #   add_header  Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
        #   add_header  X-Frame-Options            "DENY" always;
        #   add_header  X-Content-Type-Options     "nosniff" always;
        #   add_header  Referrer-Policy            "strict-origin-when-cross-origin" always;
        #   add_header  Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
        #   add_header  Content-Security-Policy    "default-src 'self'; ..." always;
        #
        # NOTE: HSTS only after Boma confirms 100% of traffic is HTTPS in
        # production — turning it on prematurely traps users.
        # ====================================================================

        # --------------------------------------------------------------------
        # ADEN: attack-path 404s (returned BEFORE any proxy_pass to Flask)
        # --------------------------------------------------------------------
        # Shadow scanners never see the app. Mirrored in tests/test_attack_paths.py
        # and attack_paths.json so role_dbsec_aden.md Q2 has automated proof.
        # --------------------------------------------------------------------
        # Generic CMS / config / VCS probes:
        location ~* ^/(\.env(\..*)?|\.git(/.*)?|\.svn(/.*)?|\.htaccess|\.htpasswd)$ {
            access_log off;
            return 404;
        }
        location ~* ^/(wp-login\.php|wp-admin|wp-config\.php|xmlrpc\.php) {
            access_log off;
            return 404;
        }
        location ~* ^/(phpmyadmin|pma|adminer)(/|$) {
            access_log off;
            return 404;
        }
        location ~* ^/(backup\.sql|dump\.sql|database\.sql|.*\.bak)$ {
            access_log off;
            return 404;
        }
        # Belt-and-suspenders for the TESTING-gated backdoor in app.py:354.
        # app.py already abort(404)s these in prod; nginx makes that
        # unreachable even if TESTING is ever flipped on by accident.
        location ~* ^/test/login/ {
            access_log off;
            return 404;
        }

        # --------------------------------------------------------------------
        # ADEN: rate-limited app routes
        # --------------------------------------------------------------------
        # /login and /register — credential surface. 5 r/m allows typo retries
        # but is brutal against credential stuffing.
        location = /login {
            limit_req  zone=auth_zone  burst=3  nodelay;
            proxy_pass http://app_upstream;

        }
        location = /register {
            limit_req  zone=auth_zone  burst=3  nodelay;
            proxy_pass http://app_upstream;

        }

        # GitHub OAuth — slightly looser because legitimate users may retry
        # the redirect chain on flaky networks.
        location = /login/github {
            limit_req  zone=oauth_zone  burst=5  nodelay;
            proxy_pass http://app_upstream;

        }
        location = /auth/github/callback {
            limit_req  zone=oauth_zone  burst=5  nodelay;
            proxy_pass http://app_upstream;

        }

        # Insight endpoint fans out to Clearbit + API Ninjas (free tiers).
        # 30 r/m matches our worst-case external quota burn.
        location ~ ^/applications/\d+/insight$ {
            limit_req  zone=insight_zone  burst=5  nodelay;
            proxy_pass http://app_upstream;

        }

        # ====================================================================
        # === BOMA: static asset location goes here ===
        # ====================================================================
        # Boma owns the /static/ block — direct-serve from the app image
        # with long-lived Cache-Control, gzip on, no proxy_pass to Flask.
        # Suggested skeleton for Boma to fill:
        #
        #   location /static/ {
        #       alias /app/static/;
        #       expires 30d;
        #       add_header Cache-Control "public, immutable";
        #       access_log off;
        #   }
        # ====================================================================

        # --------------------------------------------------------------------
        # ADEN: catch-all — general rate limit, then proxy to Flask
        # --------------------------------------------------------------------
        location / {
            limit_req  zone=general_zone  burst=20  nodelay;
            proxy_pass http://app_upstream;

        }

        # Don't leak Flask traceback HTML on internal errors — generic page.
        # The real traceback still goes to gunicorn's stderr / docker logs.
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root  /usr/share/nginx/html;
            internal;
        }
    }
}
